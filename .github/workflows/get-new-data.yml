# This workflow will run the scraper to scrape latest meeting minutes

name: Scrape new meetings

on:
  schedule:
    - cron: "00 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-latest-meeting-minutes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.0"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set date range
        run: |
          echo "END_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "START_DATE=$(date -u -d 'now - 14 days' +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run scraper
        env:
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m ottawa_city_scraper.cli \
            --start-date ${{ env.START_DATE }} \
            --end-date ${{ env.END_DATE }} \
            --meeting-name "City Council" "*Committee*" "*Commission*" "*Board*" \
            --enrich \
            --db-path datasets/ottawa_city_scraper.duckdb

      - name: Check for changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "should_commit=False" >> "$GITHUB_ENV"
          else
            echo "should_commit=True" >> "$GITHUB_ENV"
          fi

      - name: Commit changes
        if: ${{ env.should_commit == 'True' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets
          git commit -m "Scrape: update voting records ${{ env.END_DATE }}"
          git push origin data
