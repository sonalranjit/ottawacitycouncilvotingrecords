name: Deploy new page to cloudflare
on:
  schedule:
    - cron: "00 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-site-to-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.0"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Checkout latest scraped duckdb
        run: |
          git fetch origin data
          git checkout origin/data -- datasets/ottawa_city_scraper.duckdb
      - name: Export latest scraped data from duckdb
        run: |
          python -m ottawa_city_scraper.export_web_data
      - name: Build static frontend
        run: |
          cd frontend && npm run build
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist/ --project-name=ottawacitycouncilvotingrecords
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    